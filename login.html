<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Interno — Login · Walker Bank</title>
  <link rel="icon" type="image/png" href="LOGOTIPO/LOGO WALKER BANK BRANCO.png">
  
  <!-- SEO Meta Tags -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#181b2c">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  
  <style>
    /* Custom Fonts declarations */
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansRegular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansMedium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansBold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --navy: #181b2c;
      --cobalt: #20274a;
      --gold: #d4bc6e;
      --nardo: #cecfd3;
      --white: #ffffff;
      --black: #000000;
      --dark-gold: #a69458;
      --light-gray: #f5f6fa;
      --gray-text: #4a4c50;
      --font-title: Arial, Helvetica, sans-serif;
      --font-body: Arial, Helvetica, sans-serif;
      --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      background-color: var(--navy);
      color: var(--white);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .login-wrapper {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
    }
    
    /* Background effects */
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 50% 50%, rgba(32, 39, 74, 0.6), transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    .login-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120vw;
      height: 120vh;
      background-image: url('LOGOTIPO/LOGO WALKER BANK LINHA.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.025;
      z-index: 1;
      pointer-events: none;
    }
    
    .login-card {
      background: rgba(24, 27, 44, 0.85);
      border: 1px solid rgba(212, 188, 110, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 576px) {
      .login-card {
        padding: 32px 20px;
      }
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 36px;
    }
    
    .logo-img {
      height: 56px;
      width: auto;
      margin: 0 auto 12px auto;
      display: block;
    }
    
    .logo-badge {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--gold);
      background: rgba(212, 188, 110, 0.05);
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .form-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      background: rgba(24, 27, 44, 0.5);
      border: 1.5px solid rgba(206, 207, 211, 0.15);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition-smooth);
    }
    
    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212, 188, 110, 0.1);
      background: rgba(24, 27, 44, 0.9);
    }
    
    .error-box {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.8125rem;
      margin-bottom: 24px;
      display: none;
      font-weight: 500;
      text-align: center;
    }
    
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 188, 110, 0.2);
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-login:hover {
      background: var(--dark-gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 188, 110, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }
    
    .login-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.55);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px !important;
    }

    .btn-toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .btn-toggle-pass:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    
    <div class="login-card">
      <div class="logo-container">
        <img src="LOGOTIPO/LOGO WALKER BANK BRANCO.png" alt="Walker Bank" class="logo-img">
        <span class="logo-badge">Mesa de Crédito · Admin</span>
      </div>
      
      <div class="error-box" id="error-msg"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail de acesso</label>
          <input type="email" id="email" placeholder="Digite seu e-mail de acesso" required autocomplete="username">
        </div>
        
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
            <button type="button" class="btn-toggle-pass" id="toggle-password" aria-label="Mostrar senha" title="Mostrar / ocultar senha">👁</button>
          </div>
        </div>

        <div style="text-align: right; margin-top: -8px; margin-bottom: 24px;">
          <a href="#" id="link-forgot-pass" style="color: var(--gold); font-size: 0.8rem; text-decoration: none; font-weight: 500; transition: opacity 0.2s ease;">Esqueci minha senha</a>
        </div>
        
        <button type="submit" class="btn-login" id="btn-submit">
          Entrar no Sistema
        </button>
        <button type="button" class="btn-login" id="btn-demo" style="margin-top: 12px; background: rgba(212, 188, 110, 0.1); border: 1.5px solid var(--gold); color: var(--gold); box-shadow: none;">
          Acessar Modo Demonstração (Mocks Offline)
        </button>
      </form>

      <!-- Form de Recuperação de Senha -->
      <form id="forgot-password-form" style="display: none;">
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="recovery-email">E-mail de Acesso</label>
          <input type="email" id="recovery-email" placeholder="Digite seu e-mail cadastrado" required autocomplete="email">
        </div>
        
        <button type="submit" class="btn-login" id="btn-recovery-submit">
          Enviar Link de Recuperação
        </button>
        <button type="button" class="btn-login" id="btn-back-to-login" style="margin-top: 12px; background: transparent; border: 1.5px solid rgba(255, 255, 255, 0.15); color: var(--white); box-shadow: none;">
          Voltar ao Login
        </button>
      </form>

      <!-- Form de Nova Senha (para redefinição via e-mail) -->
      <form id="new-password-form" style="display: none;">
        <div class="form-group" style="margin-bottom: 30px;">
          <label for="new-password">Definir Nova Senha</label>
          <div class="password-wrapper">
            <input type="password" id="new-password" placeholder="Digite sua nova senha" required minlength="6" autocomplete="new-password">
            <button type="button" class="btn-toggle-pass" id="toggle-new-password" aria-label="Mostrar senha" title="Mostrar / ocultar senha">👁</button>
          </div>
        </div>
        
        <button type="submit" class="btn-login" id="btn-new-pass-submit">
          Atualizar Senha e Entrar
        </button>
      </form>

      
      <div class="login-footer">
        Acesso restrito a colaboradores autorizados.<br>
        Walker Bank © 2026. Todos os direitos reservados.
      </div>
    </div>
    
  </div>

  <!-- Supabase JS Client (Local) -->
  <script src="supabase.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const errorMsg = document.getElementById("error-msg");

      // Verifica se o SDK do Supabase foi carregado corretamente
      if (typeof supabase === "undefined") {
        errorMsg.textContent = "Erro crítico: Não foi possível carregar a biblioteca do banco de dados local (supabase.js). Por favor, atualize a página.";
        errorMsg.style.display = "block";
        return;
      }

      // Feedback de bloqueio administrativo
      if (window.location.search.includes("blocked=true")) {
        errorMsg.textContent = "Sua conta foi inativada pelo administrador. Entre em contato com o suporte.";
        errorMsg.style.display = "block";
      }

      // Se já estiver no modo demonstrativo offline, redireciona diretamente
      if (sessionStorage.getItem("walker_demo_mode") === "true" && sessionStorage.getItem("walker_admin_session") === "true") {
        window.location.href = "dashboard.html";
        return;
      }

      // Configuração do Supabase Client
      const supabaseUrl = "https://jmbolyzmpfnggvoedaiu.supabase.co";
      const supabaseKey = "sb_publishable_EuvTPlZxoQqG9Owc3Yr9Uw_L1rTcLnP";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      // Função auxiliar para restaurar os estilos originais do box de erros
      const resetErrorBoxStyles = () => {
        errorMsg.style.backgroundColor = "";
        errorMsg.style.borderColor = "";
        errorMsg.style.color = "";
        errorMsg.style.display = "none";
      };

      // 1. GERENCIAMENTO DE INTERFACE (VIEWS)
      const loginForm = document.getElementById("login-form");
      const forgotForm = document.getElementById("forgot-password-form");
      const newPassForm = document.getElementById("new-password-form");
      const logoBadge = document.querySelector(".logo-badge");

      // Link "Esqueci minha senha" -> Exibe Form de Recuperação
      document.getElementById("link-forgot-pass").addEventListener("click", (e) => {
        e.preventDefault();
        resetErrorBoxStyles();
        loginForm.style.display = "none";
        forgotForm.style.display = "block";
        logoBadge.textContent = "Mesa de Crédito · Recuperar";
      });

      // Botão "Voltar ao Login" -> Exibe Login
      document.getElementById("btn-back-to-login").addEventListener("click", () => {
        resetErrorBoxStyles();
        forgotForm.style.display = "none";
        loginForm.style.display = "block";
        logoBadge.textContent = "Mesa de Crédito · Admin";
      });

      // 2. DETECÇÃO E INTERCEPTAÇÃO DE RECUPERAÇÃO DE SENHA (HASH OU ON_AUTH_STATE_CHANGE)
      const checkRecoveryFlow = () => {
        const hash = window.location.hash;
        if (hash && (hash.includes("type=recovery") || hash.includes("access_token="))) {
          loginForm.style.display = "none";
          forgotForm.style.display = "none";
          newPassForm.style.display = "block";
          logoBadge.textContent = "Mesa de Crédito · Nova Senha";
          return true;
        }
        return false;
      };

      const isRecoveryActive = checkRecoveryFlow();

      // Monitoramento adicional do evento PASSWORD_RECOVERY do Supabase Auth
      supabaseClient.auth.onAuthStateChange((event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          resetErrorBoxStyles();
          loginForm.style.display = "none";
          forgotForm.style.display = "none";
          newPassForm.style.display = "block";
          logoBadge.textContent = "Mesa de Crédito · Nova Senha";
        }
      });

      // Se não for fluxo de redefinição de senha ativo, verifica se já há sessão comum
      if (!isRecoveryActive) {
        supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
          if (session) {
            if (!sessionStorage.getItem("walker_user_profile")) {
              try {
                const { data: profile } = await supabaseClient
                  .from('profiles').select('*').eq('id', session.user.id).single();
                if (profile) sessionStorage.setItem("walker_user_profile", JSON.stringify(profile));
              } catch(e) {}
            }
            sessionStorage.setItem("walker_admin_session", "true");
            window.location.href = "dashboard.html";
          }
        }).catch(err => {
          console.warn("Erro ao obter sessão no Supabase (esperado se estiver suspenso):", err);
        });
      }

      // Evento para o botão de modo de demonstração
      document.getElementById("btn-demo").addEventListener("click", () => {
        sessionStorage.setItem("walker_admin_session", "true");
        sessionStorage.setItem("walker_demo_mode", "true");
        window.location.href = "dashboard.html";
      });

      // 3. RATE LIMITING: máx. 5 tentativas em 15 minutos
      const LOGIN_MAX_ATTEMPTS = 5;
      const LOGIN_LOCKOUT_MS   = 15 * 60 * 1000; // 15 min
      let lockoutTimer = null;

      const getLoginState = () => {
        try { return JSON.parse(localStorage.getItem("wb_login_state") || "{}"); } catch(e) { return {}; }
      };
      const saveLoginState = (s) => {
        try { localStorage.setItem("wb_login_state", JSON.stringify(s)); } catch(e) {}
      };

      const checkLockout = () => {
        const s = getLoginState();
        if (!s.lockedUntil) return false;
        const remaining = s.lockedUntil - Date.now();
        if (remaining <= 0) { saveLoginState({}); return false; }
        return remaining;
      };

      const startLockoutCountdown = (remaining) => {
        const getBtn = () => document.getElementById("btn-submit");
        const tick = () => {
          const s = getLoginState();
          const rem = (s.lockedUntil || 0) - Date.now();
          if (rem <= 0) {
            saveLoginState({});
            const b = getBtn();
            if (b) { b.disabled = false; b.textContent = "Entrar no Sistema"; }
            errorMsg.textContent = "Bloqueio encerrado. Tente novamente.";
            errorMsg.style.display = "block";
            clearInterval(lockoutTimer);
            return;
          }
          const mins = Math.ceil(rem / 60000);
          const b = getBtn();
          if (b) b.textContent = `Bloqueado por ${mins} min`;
        };
        tick();
        const b = getBtn();
        if (b) b.disabled = true;
        lockoutTimer = setInterval(tick, 10000);
      };

      // Verifica bloqueio ao carregar a página
      const initialLockout = checkLockout();
      if (initialLockout) {
        errorMsg.textContent = `Muitas tentativas incorretas. Aguarde ${Math.ceil(initialLockout / 60000)} minuto(s).`;
        errorMsg.style.display = "block";
        startLockoutCountdown(initialLockout);
      }

      // 3. EVENTO DE LOGIN (E-MAIL E SENHA)
      const btnSubmit = document.getElementById("btn-submit");
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const remaining = checkLockout();
        if (remaining) {
          errorMsg.textContent = `Conta temporariamente bloqueada. Aguarde ${Math.ceil(remaining / 60000)} minuto(s).`;
          errorMsg.style.display = "block";
          return;
        }

        const user = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;

        btnSubmit.textContent = "Autenticando...";
        btnSubmit.disabled = true;
        resetErrorBoxStyles();

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: user,
            password: pass
          });

          if (error) {
            const s = getLoginState();
            const attempts = (s.attempts || 0) + 1;
            if (attempts >= LOGIN_MAX_ATTEMPTS) {
              const lockedUntil = Date.now() + LOGIN_LOCKOUT_MS;
              saveLoginState({ attempts, lockedUntil });
              errorMsg.textContent = `Muitas tentativas incorretas. Acesso bloqueado por 15 minutos.`;
              errorMsg.style.display = "block";
              startLockoutCountdown(LOGIN_LOCKOUT_MS);
            } else {
              saveLoginState({ attempts });
              const restam = LOGIN_MAX_ATTEMPTS - attempts;
              errorMsg.textContent = `E-mail ou senha inválidos. ${restam} tentativa${restam > 1 ? 's' : ''} restante${restam > 1 ? 's' : ''}.`;
              errorMsg.style.display = "block";
              btnSubmit.textContent = "Entrar no Sistema";
              btnSubmit.disabled = false;
            }
          } else {
            saveLoginState({}); // reseta contador em login bem-sucedido
            // Busca o perfil do usuário no banco e salva na sessão
            try {
              const { data: profile } = await supabaseClient
                .from('profiles').select('*').eq('id', data.user.id).single();
              if (profile) sessionStorage.setItem("walker_user_profile", JSON.stringify(profile));
            } catch(pe) {
              console.warn("[Walker Bank] Perfil não encontrado, prosseguindo como admin.");
            }
            sessionStorage.setItem("walker_admin_session", "true");
            window.location.href = "dashboard.html";
          }
        } catch (err) {
          console.error("Erro na autenticação:", err);
          errorMsg.textContent = "Ocorreu um erro ao conectar ao serviço de autenticação.";
          errorMsg.style.display = "block";
          btnSubmit.textContent = "Entrar no Sistema";
          btnSubmit.disabled = false;
        }
      });

      // 4. EVENTO DE SOLICITAÇÃO DE RECUPERAÇÃO DE SENHA
      const btnRecoverySubmit = document.getElementById("btn-recovery-submit");
      forgotForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("recovery-email").value.trim();

        btnRecoverySubmit.textContent = "Enviando...";
        btnRecoverySubmit.disabled = true;
        resetErrorBoxStyles();

        try {
          const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + window.location.pathname
          });

          if (error) {
            errorMsg.textContent = error.message || "Erro ao solicitar recuperação. Tente novamente.";
            errorMsg.style.display = "block";
            btnRecoverySubmit.textContent = "Enviar Link de Recuperação";
            btnRecoverySubmit.disabled = false;
          } else {
            errorMsg.innerHTML = "Link de recuperação enviado com sucesso!<br>Verifique a caixa de entrada do seu e-mail.";
            errorMsg.style.backgroundColor = "rgba(39, 174, 96, 0.1)";
            errorMsg.style.borderColor = "rgba(39, 174, 96, 0.3)";
            errorMsg.style.color = "var(--green-success)";
            errorMsg.style.display = "block";

            forgotForm.reset();
            setTimeout(() => {
              resetErrorBoxStyles();
              forgotForm.style.display = "none";
              loginForm.style.display = "block";
              logoBadge.textContent = "Mesa de Crédito · Admin";
              btnRecoverySubmit.textContent = "Enviar Link de Recuperação";
              btnRecoverySubmit.disabled = false;
            }, 5000);
          }
        } catch (err) {
          console.error("Erro ao solicitar recuperação:", err);
          errorMsg.textContent = "Erro de conexão ao solicitar recuperação.";
          errorMsg.style.display = "block";
          btnRecoverySubmit.textContent = "Enviar Link de Recuperação";
          btnRecoverySubmit.disabled = false;
        }
      });

      // 5. EVENTO DE DEFINIÇÃO DE NOVA SENHA
      const btnNewPassSubmit = document.getElementById("btn-new-pass-submit");
      newPassForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById("new-password").value;

        if (newPassword.length < 6) {
          errorMsg.textContent = "A senha deve conter no mínimo 6 caracteres.";
          errorMsg.style.display = "block";
          return;
        }

        btnNewPassSubmit.textContent = "Salvando Senha...";
        btnNewPassSubmit.disabled = true;
        resetErrorBoxStyles();

        try {
          const { data, error } = await supabaseClient.auth.updateUser({
            password: newPassword
          });

          if (error) {
            errorMsg.textContent = error.message || "Erro ao redefinir a senha. Tente novamente.";
            errorMsg.style.display = "block";
            btnNewPassSubmit.textContent = "Atualizar Senha e Entrar";
            btnNewPassSubmit.disabled = false;
          } else {
            try {
              const { data: profile } = await supabaseClient
                .from('profiles').select('*').eq('id', data.user.id).single();
              if (profile) sessionStorage.setItem("walker_user_profile", JSON.stringify(profile));
            } catch(pe) {
              console.warn("[Walker Bank] Perfil não encontrado ao atualizar senha.");
            }

            sessionStorage.setItem("walker_admin_session", "true");

            errorMsg.innerHTML = "Senha alterada com sucesso! Redirecionando...";
            errorMsg.style.backgroundColor = "rgba(39, 174, 96, 0.1)";
            errorMsg.style.borderColor = "rgba(39, 174, 96, 0.3)";
            errorMsg.style.color = "var(--green-success)";
            errorMsg.style.display = "block";

            setTimeout(() => {
              // Limpa o hash de redefinição da URL
              window.location.hash = "";
              window.location.href = "dashboard.html";
            }, 2000);
          }
        } catch (err) {
          console.error("Erro ao atualizar senha:", err);
          errorMsg.textContent = "Erro de conexão ao salvar nova senha.";
          errorMsg.style.display = "block";
          btnNewPassSubmit.textContent = "Atualizar Senha e Entrar";
          btnNewPassSubmit.disabled = false;
        }
      });

      // Toggle show/hide senha (login)
      document.getElementById("toggle-password").addEventListener("click", () => {
        const pwInput = document.getElementById("password");
        const btn = document.getElementById("toggle-password");
        if (pwInput.type === "password") {
          pwInput.type = "text";
          btn.textContent = "🙈";
          btn.setAttribute("aria-label", "Ocultar senha");
        } else {
          pwInput.type = "password";
          btn.textContent = "👁";
          btn.setAttribute("aria-label", "Mostrar senha");
        }
      });

      // Toggle show/hide senha (nova senha)
      document.getElementById("toggle-new-password").addEventListener("click", () => {
        const pwInput = document.getElementById("new-password");
        const btn = document.getElementById("toggle-new-password");
        if (pwInput.type === "password") {
          pwInput.type = "text";
          btn.textContent = "🙈";
          btn.setAttribute("aria-label", "Ocultar senha");
        } else {
          pwInput.type = "password";
          btn.textContent = "👁";
          btn.setAttribute("aria-label", "Mostrar senha");
        }
      });
    });
  </script>

</body>
