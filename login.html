<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Interno — Login · Walker Bank</title>
  
  <!-- SEO Meta Tags -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#181b2c">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  
  <style>
    /* Custom Fonts declarations */
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansRegular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansMedium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
    }
    @font-face {
      font-family: 'Giga Sans';
      src: url('FONTE/GIGA SANS/Locomotype  GigaSansBold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --navy: #181b2c;
      --cobalt: #20274a;
      --gold: #d4bc6e;
      --nardo: #cecfd3;
      --white: #ffffff;
      --black: #000000;
      --dark-gold: #a69458;
      --light-gray: #f5f6fa;
      --gray-text: #606266;
      --font-title: 'Giga Sans', sans-serif;
      --font-body: 'Giga Sans', sans-serif;
      --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    html, body {
      height: 100%;
      font-family: var(--font-body);
      background-color: var(--navy);
      color: var(--white);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .login-wrapper {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
    }
    
    /* Background effects */
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 50% 50%, rgba(32, 39, 74, 0.6), transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    .login-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120vw;
      height: 120vh;
      background-image: url('LOGOTIPO/LOGO WALKER BANK LINHA.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.025;
      z-index: 1;
      pointer-events: none;
    }
    
    .login-card {
      background: rgba(24, 27, 44, 0.85);
      border: 1px solid rgba(212, 188, 110, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @media (max-width: 576px) {
      .login-card {
        padding: 32px 20px;
      }
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 36px;
    }
    
    .logo-img {
      height: 56px;
      width: auto;
      margin: 0 auto 12px auto;
      display: block;
    }
    
    .logo-badge {
      display: inline-block;
      border: 1px solid var(--gold);
      color: var(--gold);
      background: rgba(212, 188, 110, 0.05);
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .form-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }
    
    .form-group input {
      width: 100%;
      background: rgba(24, 27, 44, 0.5);
      border: 1.5px solid rgba(206, 207, 211, 0.15);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition-smooth);
    }
    
    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212, 188, 110, 0.1);
      background: rgba(24, 27, 44, 0.9);
    }
    
    .error-box {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.8125rem;
      margin-bottom: 24px;
      display: none;
      font-weight: 500;
      text-align: center;
    }
    
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(212, 188, 110, 0.2);
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-login:hover {
      background: var(--dark-gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 188, 110, 0.35);
    }

    .btn-login:active {
      transform: translateY(0);
    }
    
    .login-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px !important;
    }

    .btn-toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .btn-toggle-pass:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    
    <div class="login-card">
      <div class="logo-container">
        <img src="LOGOTIPO/LOGO WALKER BANK BRANCO.png" alt="Walker Bank" class="logo-img">
        <span class="logo-badge">Mesa de Crédito · Admin</span>
      </div>
      
      <div class="error-box" id="error-msg"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail de acesso</label>
          <input type="email" id="email" placeholder="Digite seu e-mail de acesso" required autocomplete="username">
        </div>
        
        <div class="form-group" style="margin-bottom: 30px;">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
            <button type="button" class="btn-toggle-pass" id="toggle-password" aria-label="Mostrar senha" title="Mostrar / ocultar senha">👁</button>
          </div>
        </div>
        
        <button type="submit" class="btn-login" id="btn-submit">
          Entrar no Sistema
        </button>
      </form>
      
      <div class="login-footer">
        Acesso restrito a colaboradores autorizados.<br>
        Walker Bank © 2026. Todos os direitos reservados.
      </div>
    </div>
    
  </div>

  <!-- Supabase JS Client (Local) -->
  <script src="supabase.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const errorMsg = document.getElementById("error-msg");

      // Verifica se o SDK do Supabase foi carregado corretamente
      if (typeof supabase === "undefined") {
        errorMsg.textContent = "Erro crítico: Não foi possível carregar a biblioteca do banco de dados local (supabase.js). Por favor, atualize a página.";
        errorMsg.style.display = "block";
        return;
      }

      // Configuração do Supabase Client
      const supabaseUrl = "https://jmbolyzmpfnggvoedaiu.supabase.co";
      const supabaseKey = "sb_publishable_EuvTPlZxoQqG9Owc3Yr9Uw_L1rTcLnP";
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

      // Se já tiver logado no Supabase, redireciona
      supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          window.location.href = "dashboard.html";
        }
      });

      const loginForm = document.getElementById("login-form");
      const btnSubmit = document.getElementById("btn-submit");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const user = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;

        // Desabilita botão e exibe carregamento
        btnSubmit.textContent = "Autenticando...";
        btnSubmit.disabled = true;
        errorMsg.style.display = "none";

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: user,
            password: pass
          });

          if (error) {
            errorMsg.textContent = "E-mail ou senha inválidos. Verifique suas credenciais e tente novamente.";
            errorMsg.style.display = "block";
            btnSubmit.textContent = "Entrar no Sistema";
            btnSubmit.disabled = false;
          } else {
            // Backup para compatibilidade e controle de sessão simples
            sessionStorage.setItem("walker_admin_session", "true");
            window.location.href = "dashboard.html";
          }
        } catch (err) {
          console.error("Erro na autenticação:", err);
          errorMsg.textContent = "Ocorreu um erro ao conectar ao serviço de autenticação.";
          errorMsg.style.display = "block";
          btnSubmit.textContent = "Entrar no Sistema";
          btnSubmit.disabled = false;
        }
      });

      // Toggle show/hide senha
      document.getElementById("toggle-password").addEventListener("click", () => {
        const pwInput = document.getElementById("password");
        const btn = document.getElementById("toggle-password");
        if (pwInput.type === "password") {
          pwInput.type = "text";
          btn.textContent = "🙈";
          btn.setAttribute("aria-label", "Ocultar senha");
        } else {
          pwInput.type = "password";
          btn.textContent = "👁";
          btn.setAttribute("aria-label", "Mostrar senha");
        }
      });
    });
  </script>

</body>
</html>
